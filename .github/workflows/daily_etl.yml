name: Daily ETL

on:
  schedule:
    # 16:00 UTC = 12:00 PM US Eastern during EDT (UTC-4, roughly Mar-Nov).
    # GitHub Actions cron is fixed UTC and doesn't follow DST — once EST
    # (UTC-5) kicks in for the winter, this will fire at 11:00 AM Eastern
    # instead of noon. Update to "0 17 * * *" then if you want it pinned to
    # noon Eastern year-round.
    - cron: "0 16 * * *"
  workflow_dispatch:   # allow manual "Run workflow" from the Actions tab

jobs:
  run-etl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one candidate's MailChimp key being dead shouldn't block the others
      matrix:
        # All three MailChimp scripts retired from the nightly run 2026-07-22:
        # - etl_mailchimp_wiley.py: Wiley is Brevo-only since 7/14; running this against
        #   the closed/empty MailChimp account would clear and never repopulate
        #   conversation_starts for his email rows. Replaced by etl_brevo_wiley.py.
        # - etl_mailchimp_joy_eakins.py / etl_mailchimp_czajka.py: decommissioned
        #   clients, already hidden in the dashboard UI.
        # The .py files and MC_KEY secrets below are kept as-is for future MailChimp
        # clients — add a matrix entry here when one signs on.
        script: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install psycopg2-binary requests

      - name: Run ${{ matrix.script }}
        env:
          DB_HOST:       ${{ secrets.DB_HOST }}
          DB_NAME:       ${{ secrets.DB_NAME }}
          DB_USER:       ${{ secrets.DB_USER }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          WILEY_MC_KEY:  ${{ secrets.WILEY_MC_KEY }}
          JOY_MC_KEY:    ${{ secrets.JOY_MC_KEY }}
          CZAJKA_MC_KEY: ${{ secrets.CZAJKA_MC_KEY }}
        run: python ${{ matrix.script }}

  wake-dashboard:
    needs: run-etl
    if: always()   # still ping even if one candidate's ETL failed
    runs-on: ubuntu-latest
    steps:
      - name: Visit the dashboard so its 5-minute data cache refreshes
        run: |
          curl -sSL -o /dev/null -w "dashboard responded: %{http_code}\n" \
            "https://maevex00-eli-learning-engine-learning-engine-v1-dkocdx.streamlit.app/" || true
